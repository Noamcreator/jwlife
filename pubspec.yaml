name: jwlife
description: "Jw Life est une application codé avec Flutter. L'objectif de ce projet est de refaire l'application \"Jw Library\" pour corriger des bugs et pour ajouter des fonctionalités à la vie d'un Témoins de Jéhovah !"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  package_info_plus: ^8.1.4
  path_provider: ^2.1.5
  file_picker: ^8.3.1
  http: ^1.3.0
  cupertino_icons: ^1.0.8
  encrypt: ^5.0.3
  crypto: ^3.0.6
  archive: ^3.6.1
  sqflite_common_ffi: ^2.3.4+4
  shared_preferences: ^2.5.1
  url_launcher: ^6.3.1
  just_audio: ^0.9.45
  just_audio_windows: ^0.2.2
  just_audio_background: ^0.0.1-beta.15
  video_player: ^2.9.2
  video_player_win: ^3.1.1
  cached_network_image: ^3.4.1
  html: ^0.15.5
  realm: ^20.0.1
  qr_flutter: ^4.1.0
  printing: ^5.14.0
  share_plus: ^10.1.4
  uuid: ^4.5.1
  flutter_timezone: ^4.1.0
  searchfield: ^1.2.4
  rxdart: ^0.28.0
  dio: ^5.8.0+1
  open_file: ^3.5.10
  permission_handler: ^11.3.1
  flutter_inappwebview: ^6.1.5
  flutter_inappwebview_windows: ^0.6.0
  flutter_asset_generator: ^1.2.0
  beamer: ^1.7.0
  connectivity_plus: ^6.1.2
  app_settings: ^5.1.1
  speech_to_text: ^7.0.0
  table_calendar: ^3.1.3
  flutter_contacts: ^1.1.9+2
  flutter_colorpicker: ^1.1.0

  #firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/ic_launcher.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  windows:
    generate: true
    image_path: "assets/icons/ic_launcher.png"
    icon_size: 48 # min:48, max:256, default: 48

flutter:
  generate: true

  uses-material-design: true

  assets:
    - assets/db/
    - assets/icons/
    - assets/images/
    - assets/userData/
    - assets/webapp/fonts/
    - assets/webapp/jw-styles.css
    - assets/webapp/highlight.js
  fonts:
    - family: NotoSansBold
      fonts:
        - asset: assets/webapp/fonts/NotoSans-Bold.ttf
    - family: jw-icons-external
      fonts:
        - asset: assets/webapp/fonts/jw-icons-external-1970474.ttf