name: jwlife
description: "Jw Life est une application codé avec Flutter. L'objectif de ce projet est de refaire l'application \"Jw Library\" pour corriger des bugs et pour ajouter des fonctionalités à la vie d'un Témoins de Jéhovah !"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  package_info_plus: ^8.1.2
  path_provider: ^2.1.5
  file_picker: 8.1.4
  http: ^1.2.2
  cupertino_icons: ^1.0.8
  intl: ^0.20.1
  encrypt: ^5.0.3
  crypto: ^3.0.6
  archive: ^3.6.1
  sqflite_common_ffi: ^2.3.4+4
  flutter_launcher_icons: ^0.14.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  just_audio: ^0.9.42
  just_audio_background: ^0.0.1-beta.14
  video_player: ^2.9.2
  video_player_win: ^3.1.1
  cached_network_image: ^3.4.1
  html: ^0.15.5
  flutter_pdfview: ^1.3.4
  realm: ^20.0.0
  qr_flutter: ^4.1.0
  printing: ^5.13.4
  share_plus: ^10.1.3
  uuid: ^4.5.1
  flutter_timezone: ^4.0.0
  searchfield: ^1.2.1
  rxdart: ^0.28.0
  dio: ^5.7.0
  flutter_inappwebview: ^6.1.5
  flutter_asset_generator: ^1.2.0
  flutter_context_menu: ^0.2.0
  beamer: ^1.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icons/jw_life.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  windows:
    generate: true
    image_path: "assets/icons/jw_life.png"
    icon_size: 48 # min:48, max:256, default: 48

flutter:
  assets:
    - assets/db/
    - assets/icons/
    - assets/images/
    - assets/userData/
    - assets/webapp/
  fonts:
    - family: jw-icons-external
      fonts:
        - asset: assets/webapp/fonts/jw-icons-external-1970474.ttf

  uses-material-design: true